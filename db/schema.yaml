# DeepScript - Schema v4
# Single Source of Truth for database structure
# Used by: CLAUDE.md, migration scripts, skills (/add, /export, /import)
# Updated: 2026-03-25

# Date conventions:
# - Integer years (e.g., 1453)
# - Imprecise dates: use note field (e.g., note: "circa 1450")
# - Earliest reliable data: ~1100 AD (tardo medioevo)

meta:
  version: 4
  updated: 2026-03-25
  description: Single source of truth for DeepScript database schema

# =============================================================================
# NODE TYPES
# =============================================================================

node_types:
  - Person
  - Organization    # with sub-labels
  - Family
  - Event

# Organization sub-labels
org_sublabels:
  - Forum           # Bilderberg, Trilateral, WEF, CFR
  - Company         # Corporate, holding
  - Bank            # Commercial + investment banks
  - CentralBank     # Fed, ECB, BoE
  - AssetManager    # BlackRock, Vanguard
  - PrivateEquity   # KKR, Carlyle, Blackstone
  - HedgeFund       # Bridgewater, Soros Fund
  - SWF             # Sovereign wealth funds
  - Government      # National executives
  - Party           # Political parties
  - Foundation      # Rockefeller, Gates, Open Society
  - ThinkTank       # Brookings, ISPI, Aspen
  - University      # Harvard, Oxford, Bocconi
  - Agency          # UN, IMF, NATO, EU Commission
  - Media           # News, TV, agency
  - Defense         # Lockheed Martin, RTX, BAE, Leonardo
  - Pharma          # Pfizer, Moderna, Roche, GSK
  - SportsClub      # PSG, Manchester City, AC Milan
  - Automaker       # BMW, Toyota, Stellantis, Geely
  - Airline         # Delta, Lufthansa, Emirates
  - SecretSociety   # Illuminati, Skull and Bones, P2, logge massoniche
  - Sect            # Donme, movimenti cripto-religiosi
  - ReligiousInstitution  # Consistoire, CRIF, rabbinati, seminari
  # Historical states
  - Kingdom         # Regni pre-moderni (Napoli, Sardegna, Prussia)
  - Empire          # Ottomano, Romano, Bizantino, Sacro Romano Impero
  - CityState       # Venezia, Genova, Firenze, citta' anseatiche
  - Principality    # Ducati, Granducati, Principati, Margraviati
  # Historical organizations
  - ReligiousOrder  # Templari, Gesuiti, Cavalieri Teutonici
  - MilitaryOrder   # Ordine di Malta (quando distinto da religioso)
  - Guild           # Gilde mercantili, Arti di Firenze
  - TradingCompany  # VOC, East India Company, Compagnia Moscovita

# =============================================================================
# RELATIONSHIP TYPES
# =============================================================================

relationship_types:
  AFFILIATED_WITH:
    from: Person
    to: Organization
    properties:
      - role          # from affiliation_roles enum
      - from          # start year
      - to            # end year (null = current)
      - note          # details

  STAKE_IN:
    from: Organization
    to: Organization
    properties:
      - role          # from stake_roles enum
      - share         # percentage (0.0-1.0) or string "majority"
      - from
      - to
      - note

  MEMBER_OF:
    from: Person
    to: Family
    properties:
      - generation    # 1, 2, 3...
      - role          # from family_roles enum
      - note          # details

  RELATED_TO:
    from: Person
    to: Person
    properties:
      - type          # from person_relation_types enum
      - note          # details: "father", "rival", etc.

  PARTICIPATED_IN:
    from: Person
    to: Event
    properties:
      - role          # from event_participation_roles enum
      - note          # details

  INVOLVED_IN:
    from: Organization
    to: Event
    properties:
      - role          # from event_involvement_roles enum
      - note          # details

